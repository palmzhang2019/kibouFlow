name: Admin GEO Governance

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/admin-geo-governance.yml"
      - "package.json"
      - "src/app/api/admin/**"
      - "src/lib/admin-session.ts"
      - "src/lib/require-admin-api.ts"
      - "src/lib/geo-audit-*.ts"
      - "src/lib/geo-principles-audit-runner.ts"
      - "src/lib/geo-rules.ts"
      - "tests/unit/admin-session.test.ts"
      - "tests/integration/geo-admin-login.route.test.ts"
      - "tests/integration/geo-audit-admin.route.test.ts"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/admin-geo-governance.yml"
      - "package.json"
      - "src/app/api/admin/**"
      - "src/lib/admin-session.ts"
      - "src/lib/require-admin-api.ts"
      - "src/lib/geo-audit-*.ts"
      - "src/lib/geo-principles-audit-runner.ts"
      - "src/lib/geo-rules.ts"
      - "tests/unit/admin-session.test.ts"
      - "tests/integration/geo-admin-login.route.test.ts"
      - "tests/integration/geo-audit-admin.route.test.ts"

jobs:
  admin-geo-guard:
    name: Admin GEO Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Admin GEO verification
        run: npm run verify:admin-geo
